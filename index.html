<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mahima Agarwal · Project Tracker 2026–27</title>

    <!-- Fonts: Fraunces (display) · Inter (body) · JetBrains Mono (numerals) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap"
        rel="stylesheet" />

    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        /* ---------- DESIGN TOKENS ---------- */
        :root {
            --maroon-900: #4a1521;
            --maroon-700: #6f2435;
            --brass: #b8842f;
            --gold: #d2a64c;

            --cream: #f2efe8;
            --card: #ffffff;

            --text: #2a201d;
            --muted: #8a7d72;
            --faint: #b6a99d;
            --line: #ece5da;
            --line-soft: #f4efe6;
            --row-hover: #faf6ee;

            --live: #2f8f5b;
            --live-bg: #e7f2ea;
            --pending: #97836a;
            --pending-bg: #efe9dc;

            --radius: 22px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background: radial-gradient(1100px 560px at 50% -12%, #efe7d8 0%, var(--cream) 62%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2.5rem 1rem;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* ---------- CARD ---------- */
        .container {
            max-width: 1020px;
            width: 100%;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: 0 30px 70px -28px rgba(74, 21, 33, 0.40);
            overflow: hidden;
            border: 1px solid rgba(74, 21, 33, 0.05);
        }

        /* ---------- HEADER ---------- */
        .header {
            background: linear-gradient(135deg, var(--maroon-900) 0%, var(--maroon-700) 100%);
            padding: 2.2rem 2.8rem 1.5rem 2.8rem;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(420px 220px at 100% 0%, rgba(210, 166, 76, 0.22), transparent 70%);
            pointer-events: none;
        }

        .header>* {
            position: relative;
            z-index: 1;
        }

        .eyebrow {
            font-family: "JetBrains Mono", monospace;
            font-size: 0.68rem;
            letter-spacing: 2.2px;
            text-transform: uppercase;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.55rem;
        }

        .eyebrow .dash {
            width: 26px;
            height: 1px;
            background: var(--gold);
            opacity: 0.7;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-title h1 {
            font-family: "Fraunces", serif;
            font-size: 2.15rem;
            font-weight: 600;
            letter-spacing: -0.4px;
            line-height: 1.05;
        }

        .header-title .sub {
            font-size: 0.86rem;
            opacity: 0.74;
            margin-top: 0.4rem;
        }

        .developer-badge {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.16);
            padding: 0.5rem 1.1rem;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.55rem;
            white-space: nowrap;
        }

        .developer-badge i {
            color: var(--gold);
            font-size: 0.85rem;
        }

        .developer-badge .role {
            opacity: 0.62;
            font-weight: 400;
        }

        /* ---------- STAT STRIP ---------- */
        .header-meta {
            display: flex;
            gap: 2.6rem;
            margin-top: 1.5rem;
            padding-top: 1.1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            flex-wrap: wrap;
        }

        .stat {
            display: flex;
            flex-direction: column;
        }

        .stat .num {
            font-family: "JetBrains Mono", monospace;
            font-size: 1.35rem;
            font-weight: 600;
            line-height: 1;
        }

        .stat .num.accent {
            color: var(--gold);
        }

        .stat .lbl {
            font-size: 0.66rem;
            text-transform: uppercase;
            letter-spacing: 1.4px;
            opacity: 0.62;
            margin-top: 0.45rem;
        }

        /* ---------- TABLE ---------- */
        .table-wrapper {
            padding: 1.4rem 2.5rem 2rem 2.5rem;
            overflow-x: auto;
        }

        .project-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 540px;
        }

        .project-table thead th {
            text-align: left;
            padding: 0.7rem 1rem 0.7rem 0;
            font-weight: 600;
            font-size: 0.66rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--faint);
            border-bottom: 1.5px solid var(--line);
            white-space: nowrap;
        }

        .project-table tbody tr {
            border-bottom: 1px solid var(--line-soft);
            transition: background 0.15s ease;
        }

        .project-table tbody tr:last-child {
            border-bottom: none;
        }

        .project-table tbody tr:hover {
            background: var(--row-hover);
        }

        .project-table tbody td {
            padding: 0.85rem 1rem 0.85rem 0;
            vertical-align: middle;
            line-height: 1.45;
        }

        .serial-cell {
            font-family: "JetBrains Mono", monospace;
            font-weight: 500;
            color: var(--faint);
            font-size: 0.78rem;
            width: 42px;
            white-space: nowrap;
        }

        .month-cell {
            width: 92px;
            white-space: nowrap;
        }

        .month-badge {
            display: inline-block;
            background: #f3ece0;
            padding: 0.18rem 0.85rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--maroon-700);
            letter-spacing: 0.2px;
        }

        .name-cell {
            font-weight: 500;
        }

        .name-link {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            color: var(--maroon-700);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.15s ease;
        }

        .name-link:hover {
            color: var(--maroon-900);
        }

        .name-link:hover .arrow {
            transform: translate(1px, -1px);
        }

        .name-link .arrow {
            font-size: 0.6rem;
            opacity: 0.55;
            transition: transform 0.15s ease;
        }

        .name-plain {
            color: var(--text);
            font-weight: 500;
        }

        .status-cell {
            width: 110px;
            white-space: nowrap;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.22rem 0.8rem;
            border-radius: 40px;
            font-size: 0.68rem;
            font-weight: 600;
        }

        .status .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .status.live {
            color: var(--live);
            background: var(--live-bg);
        }

        .status.live .dot {
            background: var(--live);
        }

        .status.pending {
            color: var(--pending);
            background: var(--pending-bg);
        }

        .status.pending .dot {
            background: var(--pending);
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 768px) {
            .header {
                padding: 1.7rem 1.5rem 1.3rem 1.5rem;
            }

            .header-title h1 {
                font-size: 1.65rem;
            }

            .header-top {
                flex-direction: column;
                align-items: flex-start;
            }

            .developer-badge {
                align-self: flex-start;
            }

            .header-meta {
                gap: 1.8rem;
            }

            .table-wrapper {
                padding: 1rem 1.2rem 1.5rem 1.2rem;
            }
        }

        /* ---------- MOTION ---------- */
        .project-table tbody tr {
            opacity: 0;
            transform: translateY(6px);
            animation: fadeUp 0.34s forwards;
        }

        .project-table tbody tr:nth-child(1) {
            animation-delay: 0.03s;
        }

        .project-table tbody tr:nth-child(2) {
            animation-delay: 0.06s;
        }

        .project-table tbody tr:nth-child(3) {
            animation-delay: 0.09s;
        }

        .project-table tbody tr:nth-child(4) {
            animation-delay: 0.12s;
        }

        .project-table tbody tr:nth-child(5) {
            animation-delay: 0.15s;
        }

        .project-table tbody tr:nth-child(6) {
            animation-delay: 0.18s;
        }

        .project-table tbody tr:nth-child(7) {
            animation-delay: 0.21s;
        }

        .project-table tbody tr:nth-child(8) {
            animation-delay: 0.24s;
        }

        .project-table tbody tr:nth-child(9) {
            animation-delay: 0.27s;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        a:focus-visible {
            outline: 2px solid var(--brass);
            outline-offset: 3px;
            border-radius: 5px;
        }

        @media (prefers-reduced-motion: reduce) {
            .project-table tbody tr {
                animation: none;
                opacity: 1;
                transform: none;
            }

            * {
                transition: none !important;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- ===== HEADER ===== -->
        <header class="header">
            <div class="eyebrow"><span class="dash"></span> 2026 – 27 · Web Development</div>

            <div class="header-top">
                <div class="header-title">
                    <h1>Project Tracker</h1>
                    <div class="sub">Active builds and deliverables, April 2026 – March 2027.</div>
                </div>
                <div class="developer-badge">
                    <i class="fas fa-user"></i>
                    Mahima Agarwal <span class="role">· Maintainer</span>
                </div>
            </div>

            <div class="header-meta">
                <div class="stat"><span class="num" id="projectCount">0</span><span class="lbl">Projects</span></div>
                <div class="stat"><span class="num" id="monthCount">0</span><span class="lbl">Months</span></div>
                <div class="stat"><span class="num accent" id="liveCount">0</span><span class="lbl">Live</span></div>
            </div>
        </header>

        <!-- ===== TABLE ===== -->
        <div class="table-wrapper">
            <table class="project-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Month</th>
                        <th>Project</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody"><!-- rows injected by JavaScript --></tbody>
            </table>
        </div>

    </div>

    <!-- ============================================================ -->
    <!--  PROJECT LIST (April 2026 – March 2027)                      -->
    <!--  link: "#" means no link yet. live: true => IITK live page.  -->
    <!-- ============================================================ -->
    <script>
        (function () {
            'use strict';

            const projects = [
                // April
                {
                    month: "April", name: "Professor S. K. Gupta — webpage", link: "https://iitk.ac.in/dora/prof-sk-gupta/prof-sk-gupta-mobile/",
                    live: true
                },
                {
                    month: "April", name: "Professor S. K. Gupta — mobile", link: "https://iitk.ac.in/dora/prof-sk-gupta/prof-sk-gupta-mobile/",
                    live: true
                },
                // May
                { month: "May", name: "IITKonverge", link: "https://iit-konverge.vercel.app/", live: false },
                { month: "May", name: "GTU website — home page", link: "https://gtu-sand.vercel.app/", live: false },
                // June
                { month: "June", name: "Class of 2016 — reunion", link: "https://iitk.ac.in/dora/reunion/class-of-2016/", live: false },
                { month: "June", name: "Class of 2001 — pledge", link: "https://pledge2001.vercel.app/", live: false },
                { month: "June", name: "Arzoo Katiyar — memorial", link: "https://arzoo-five.vercel.app/", live: false },
                { month: "June", name: "Synapse Nexus — research intelligence", link: "https://synapse-sepia-five.vercel.app/", live: false },
                {
                    month: "June", name: "Donor recognition — webpage", link: "https://donor-recognition.vercel.app/",
                    live: false
                },
                {
                    month: "June", name: "Class of 2012", link: "https://class-of-2012.vercel.app/",
                    live: false
                },
                {
                    month: "June", name: "Class of 1992", link: "https://class-of-1992.vercel.app/",
                    live: false
                },
                {
                    month: "June", name: "Class of 1981", link: "https://class-of-1981.vercel.app/",
                    live: false
                },
                {
                    month: "June", name: "KarvaanIndia", link: "",
                    live: false
                },
                {
                    month: "June", name: "Pioneering Research and Innovation Awards", link: "",
                    live: false
                }

            ];

            // ---- no edits needed below ----
            const tbody = document.getElementById('tableBody');
            const projectCountEl = document.getElementById('projectCount');
            const monthCountEl = document.getElementById('monthCount');
            const liveCountEl = document.getElementById('liveCount');

            const hasLink = p => p.link && p.link.trim() !== '#';
            const uniqueMonths = [...new Set(projects.map(p => p.month))];
            const liveTotal = projects.filter(p => p.live).length;
            const pad = n => String(n).padStart(2, '0');

            function render() {
                let html = '';

                projects.forEach((proj, i) => {
                    const nameCell = hasLink(proj) ?
                        `<a class="name-link" href="${proj.link}" target="_blank" rel="noopener" title="${proj.live ? 'Open live page' : 'Open preview'}">${proj.name} <i class="fas fa-arrow-up-right-from-square arrow"></i></a>` :
                        `<span class="name-plain">${proj.name}</span>`;

                    const statusCell = proj.live ?
                        `<span class="status live"><span class="dot"></span> Live</span>` :
                        `<span class="status pending"><span class="dot"></span> Pending</span>`;

                    html += `
                            <tr>
                                <td class="serial-cell">${pad(i + 1)}</td>
                                <td class="month-cell"><span class="month-badge">${proj.month}</span></td>
                                <td class="name-cell">${nameCell}</td>
                                <td class="status-cell">${statusCell}</td>
                            </tr>`;
                });

                tbody.innerHTML = html;
                projectCountEl.textContent = pad(projects.length);
                monthCountEl.textContent = pad(uniqueMonths.length);
                liveCountEl.textContent = pad(liveTotal);
            }

            render();
        })();
    </script>

</body>

</html>
